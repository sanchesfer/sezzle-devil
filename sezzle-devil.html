<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>SEZZLE DEVIL</title>
<style>
  :root{
    --purple:#5B3F8C; --purple-lt:#8B6FBF; --bg:#FFFFFF; --surface:#F8F7FA;
    --green:#10B981; --amber:#F59E0B; --red:#EF4444;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#2a1d47; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  #wrap{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas{ display:block; position:absolute; background:#fff; border-radius:2px; box-shadow:0 0 60px rgba(0,0,0,.5); }
  /* touch controls */
  .pad{ position:fixed; bottom:max(18px,env(safe-area-inset-bottom)); display:flex; gap:14px; z-index:10; opacity:0; pointer-events:none; transition:opacity .2s; }
  .pad.show{ opacity:1; pointer-events:auto; }
  #padL{ left:16px; }
  #padR{ right:16px; }
  .btn{
    width:78px; height:78px; border-radius:22px; border:none;
    display:flex; align-items:center; justify-content:center;
    font-size:34px; color:#fff; font-weight:800;
    background:rgba(91,63,140,.9);
    box-shadow:0 6px 18px rgba(0,0,0,.25); touch-action:none; user-select:none;
  }
  .btn:active,.btn.on{ background:rgba(139,111,191,.95); transform:scale(.94); }
  #jump{ width:96px; height:96px; border-radius:28px; font-size:26px; background:rgba(16,185,129,.85); }
  #jump:active,#jump.on{ background:rgba(16,185,129,1); }
  .hint{ position:fixed; bottom:4px; left:0; right:0; text-align:center; color:#fff9; font-size:11px; z-index:10; pointer-events:none; }
  @media (pointer:coarse){ .hint{ display:none; } }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>

<div class="pad" id="padL">
  <button class="btn" id="left" aria-label="left">◀</button>
  <button class="btn" id="right" aria-label="right">▶</button>
</div>
<div class="pad" id="padR">
  <button class="btn" id="jump" aria-label="jump">JUMP</button>
</div>
<div class="hint" id="hint">Arrows + Space on desktop</div>

<script>
"use strict";

let VH=VH_BASE;                // actual virtual height — grows on tall touch screens to fill the viewport
const FLOOR=700;               // top of ground
const P_W=28, P_H=36;
const GRAV_UP=2100, GRAV_DOWN=2850, MAX_FALL=1350;
const MOVE=250, JUMP_V=-810, CUT=0.45;
const COYOTE=0.09, BUFFER=0.12;

const COL={
  purple:'#5B3F8C', purpleLt:'#8B6FBF', bg:'#FFFFFF', surface:'#F8F7FA',
  green:'#10B981', amber:'#F59E0B', red:'#EF4444', ink:'#2A2140'
};

  mauve:'#8333D4', mauveDk:'#6B23B8', darkPurple:'#382757',
  green:'#33C88E', greenLt:'#7DE3B6', pink:'#FF5B6B', orange:'#FB861C', yellow:'#FFD36B', ink:'#2D2150'

function trapLabel(s){ return hardMode && FR[s] ? FR[s] : s; }

/* ============================ CANVAS SETUP ============================ */
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let dpr=1, cssW=VW, cssH=VH, cssLeft=0, cssTop=0;
let skyGrad=null;
function buildSky(){                            // cache the full-screen sky gradient (rebuilt on resize, not per frame)
  skyGrad=ctx.createLinearGradient(0,0,0,VH);
  skyGrad.addColorStop(0,'#FBF8FF'); skyGrad.addColorStop(0.5,'#EFE8FB'); skyGrad.addColorStop(1,'#DFD1F3');
}
function resize(){
  const w=window.innerWidth, h=window.innerHeight;
  const isTouch=(window.matchMedia && window.matchMedia('(pointer:coarse)').matches) || ('ontouchstart' in window);
  dpr=Math.min(window.devicePixelRatio||1, 2);
  if(isTouch){
    // Fill the viewport width when possible, but never let the play floor slip
    // under the controls or the canvas overflow the viewport height. RB is the
    // control band (button height + bottom inset + safe-area) that must stay
    // below FLOOR. scale = min(fill-width, fit-height-with-reserve):
    //  - tall portrait phones -> width binds -> full-bleed, big underground band
    //  - short 16:9 phones    -> reserve binds -> slight side bars, floor clears
    //  - wide/landscape touch  -> reserve binds -> letterboxed, gameplay visible
    const RB=140;
    const scale=Math.min(w/VW, (h-RB)/FLOOR);
    VH=Math.max(VH_BASE, Math.min(1180, Math.round(h/scale)));
    cssW=Math.round(VW*scale); cssH=Math.round(VH*scale);
    canvas.style.left='50%'; canvas.style.transform='translateX(-50%)';
    canvas.style.top=Math.round((h-cssH)/2)+'px';   // ~0 in the common (full-bleed) case
  } else {
    // Desktop: fixed 450x800, letterboxed and centered (unchanged).
    VH=VH_BASE;
    const scale=Math.min(w/VW, h/VH);
    cssW=Math.round(VW*scale); cssH=Math.round(VH*scale);
    canvas.style.left='50%'; canvas.style.transform='translateX(-50%)';
    canvas.style.top=Math.max(0,Math.round((h-cssH)/2))+'px';
  }
  canvas.style.width=cssW+'px'; canvas.style.height=cssH+'px';
  canvas.width=Math.round(VW*dpr); canvas.height=Math.round(VH*dpr);
  const r=canvas.getBoundingClientRect(); cssLeft=r.left; cssTop=r.top;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  buildSky();
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,200));

/* ============================ AUDIO (Web Audio, no files) ============================ */
let AC=null;
function audioInit(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); }
function beep(freq,dur,type,vol,slideTo){
  if(!AC) return;
  const t=AC.currentTime;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.setValueAtTime(freq,t);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(40,slideTo),t+dur);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.15,t+0.01);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur+0.02);
}
const sfx={
  coin(n){ beep(720+ (n||0)*90,0.12,'triangle',0.18); beep(1080+(n||0)*120,0.10,'sine',0.10); },
  jump(){ beep(340,0.10,'square',0.10,560); },
  land(){ beep(150,0.08,'sine',0.10,90); },
  die(){ beep(400,0.45,'sawtooth',0.18,70); },
  shield(){ beep(600,0.18,'sine',0.14,1200); beep(900,0.2,'triangle',0.1); },
  card(){ beep(500,0.14,'triangle',0.14,800); beep(760,0.14,'sine',0.1); },
  dash(){ beep(300,0.2,'sawtooth',0.12,900); },
  levelup(){ [523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.16,'triangle',0.16),i*70)); },
  win(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>beep(f,0.22,'triangle',0.18),i*110)); },
  ui(){ beep(660,0.08,'square',0.1); }
};

function buildLevel(n){ return LEVEL_FACTORIES[Math.max(0,Math.min(n,LEVEL_FACTORIES.length-1))](); }

/* ============================ GAME STATE ============================ */
let state='title';          // title | play | dying | clear | win
let hardMode=false;         // true only for Québec: French labels + compliance + airborne L1 start
let diff='canada';          // usa=easy | canada=medium | quebec=extra hard
const DIFFS={
  usa:   {trap:0.42, fake:0.20, spikeSpd:10, spikeR:78,  shoveT:0.24, shoveV:440},
  canada:{trap:0.30, fake:0.14, spikeSpd:14, spikeR:95,  shoveT:0.30, shoveV:560},

};
function D(){ return DIFFS[diff]||DIFFS.canada; }
let L=null, levelIdx=0;
let camX=0;
let score=0, totalScore=0;
let shake=0;
let deathInfo=null, deathTimer=0;
let confetti=[];
let particles=[];
let toasts=[];
let imp={x:VW-56,y:70,bob:0,mood:'grin',say:'',sayT:0};

// per-run collect/progress
let hasCard=false, dashT=0, streak=0, streakRewarded=false, combo=0, comboFlash=0;
let cp={x:0,y:0};
let invuln=0, lastSafe={x:0,y:0};
let pendingTrap={type:null,t:0};   // attribute a fall to the trap that caused it
let worldTime=0;                    // drives moving platforms
let shove={t:0,vx:0};               // active minimum-payment shove impulse
let denialFired=false, denialKnown=false, flash=0; // near-exit "CREDIT DENIED" betrayal

const player={x:0,y:0,vx:0,vy:0,grounded:false,face:1,onPlat:null,coyote:0,jumpBuf:0,jumpCut:false,squash:0,anim:0,powerHeld:false,boostUsed:false,jumped:false,jumpY0:0};

/* ============================ INPUT ============================ */
const input={left:false,right:false,jumpHeld:false};
let jumpQueued=false;
let lastJumpPressT=-1e9, powerJumpQueued=false;   // double-tap ("power jump") detection
const DTAP_MS=280;                                 // a second jump press within this window = power jump

function press(k){ audioInit();
  if(k==='left') input.left=true;
  else if(k==='right') input.right=true;
  else if(k==='jump'){
    if(perf-lastJumpPressT<DTAP_MS) powerJumpQueued=true;   // quick second tap → jump higher (like holding)
    lastJumpPressT=perf;
    if(!input.jumpHeld) jumpQueued=true; input.jumpHeld=true;
  }
}
function release(k){
  if(k==='left') input.left=false;
  else if(k==='right') input.right=false;
  else if(k==='jump') input.jumpHeld=false;
}
function bindBtn(id,key){
  const el=document.getElementById(id);
  const on=e=>{ e.preventDefault(); el.classList.add('on'); press(key); };
  const off=e=>{ e.preventDefault(); el.classList.remove('on'); release(key); };
  el.addEventListener('pointerdown',on);
  el.addEventListener('pointerup',off);
  el.addEventListener('pointerleave',off);
  el.addEventListener('pointercancel',off);
}
bindBtn('left','left'); bindBtn('right','right'); bindBtn('jump','jump');

window.addEventListener('keydown',e=>{
  if(['ArrowLeft','ArrowRight','ArrowUp','Space',' ','a','d','w'].includes(e.key)) e.preventDefault();
  if(e.repeat) return;
  audioInit();
  if(e.key==='ArrowLeft'||e.key==='a') press('left');
  else if(e.key==='ArrowRight'||e.key==='d') press('right');
  else if(e.key==='ArrowUp'||e.key===' '||e.key==='Space'||e.key==='w') press('jump');
  else if(e.key==='Enter') tapMenu();
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft'||e.key==='a') release('left');
  else if(e.key==='ArrowRight'||e.key==='d') release('right');
  else if(e.key==='ArrowUp'||e.key===' '||e.key==='Space'||e.key==='w') release('jump');
});

// canvas taps for menus / retry
function toVirt(cx,cy){
  const r=canvas.getBoundingClientRect();
  return { x:(cx-r.left)/r.width*VW, y:(cy-r.top)/r.height*VH };
}
let menuBtn=null, menuBtn2=null, menuBtn3=null; // {x,y,w,h}
function hitBtn(b,p){ return b && p.x>=b.x && p.x<=b.x+b.w && p.y>=b.y && p.y<=b.y+b.h; }
canvas.addEventListener('pointerdown',e=>{
  audioInit();
  const p=toVirt(e.clientX,e.clientY);
  if(state==='title'){
    if(hitBtn(menuBtn3,p)){ diff='quebec'; hardMode=true; sfx.ui(); startGame(); }
    else if(hitBtn(menuBtn2,p)){ diff='canada'; hardMode=false; sfx.ui(); startGame(); }
    else if(hitBtn(menuBtn,p)){ diff='usa'; hardMode=false; sfx.ui(); startGame(); }
  } else if(hitBtn(menuBtn,p)){ tapMenu(); }
  else if(state==='dying'){ tapMenu(); }
});
function tapMenu(){
  sfx.ui();
  if(state==='title'){ startGame(); }
  else if(state==='dying'){ respawn(); }
  else if(state==='clear'){ nextLevel(); }
  else if(state==='win'){ state='title'; }
}

/* ============================ FLOW ============================ */
function showPads(v){ document.getElementById('padL').classList.toggle('show',v); document.getElementById('padR').classList.toggle('show',v); }

function startGame(){
  totalScore=0; levelIdx=0; loadLevel(0);
}
function nextLevel(){
  if(levelIdx>=LEVEL_COUNT-1){ state='win'; showPads(false); sfx.win(); spawnConfetti(60); return; }
  loadLevel(levelIdx+1);
}
function loadLevel(n){
  levelIdx=n; L=buildLevel(n);
  if(hardMode && n===0){ // Québec: start airborne over lava — dash right or fall in
    L.platforms[0]=P(150,FLOOR,530,120,'ground');
    L.lava.push(LV(0,742,150,70));
    L.spawn={x:55,y:340};
  }
  hasCard=false; dashT=0; streak=0; streakRewarded=false; combo=0; comboFlash=0;
  denialFired=false; denialKnown=false; flash=0;
  score=0; particles=[]; confetti=[];
  cp={x:L.spawn.x,y:L.spawn.y};
  lastSafe={x:L.spawn.x,y:L.spawn.y};
  resetSection(true);
  state='play'; showPads(true);
  imp.say='Bet you can\'t...'; imp.sayT=2.2; imp.mood='grin';
  if(hardMode && L.invert){ addToast('⚜️ CONTRÔLES INVERSÉS — gauche ⇄ droite!', COL.red); imp.say='gauche? droite?! 😈'; imp.sayT=2.8; imp.mood='laugh'; }
}
function resetSection(full){
  player.x=cp.x; player.y=cp.y; player.vx=0; player.vy=0; player.grounded=false; player.onPlat=null;
  player.coyote=0; player.jumpBuf=0; player.jumpCut=false; player.squash=0; player.powerHeld=false; player.boostUsed=false; player.jumped=false;
  invuln=0.6;
  L.trapdoors.forEach(t=>{t.dropped=false;t.t=0;t.trig=false;});
  L.fakes.forEach(f=>{f.vanished=false;f.t=0;f.trig=false;});
  L.spikes.forEach(s=>{s.cur=0;s.trig=false;s._roar=false;});
  (L.shovers||[]).forEach(s=>{s.fired=false;s.anim=0;});
  pendingTrap={type:null,t:0}; shove={t:0,vx:0}; denialFired=false;
  camX=Math.max(0,Math.min(player.x-VW*0.4, L.worldW-VW));
}
function respawn(){ deathInfo=null; state='play'; showPads(true); resetSection(false); }

function die(type){
  if(invuln>0 || state!=='play') return;
  if(type==='void' && pendingTrap.t>0 && pendingTrap.type) type=pendingTrap.type;
  sfx.die(); shake=18; showPads(false);
  const tips=L.tips||{};
  deathInfo=tips[type]||tips.void||{one:'The old way got you! 💸',les:'Pay in 4 with Sezzle. Try again.'};
  imp.mood='laugh'; imp.say='HA! Told ya 😈'; imp.sayT=3;
  state='dying'; deathTimer=0;
  spawnBurst(player.x+P_W/2,player.y+P_H/2,COL.red,20);
}

/* ============================ PARTICLES / JUICE ============================ */
function spawnBurst(x,y,color,count){
  for(let i=0;i<(count||10);i++){
    const a=Math.random()*Math.PI*2, sp=60+Math.random()*220;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-60,life:0.5+Math.random()*0.5,age:0,color,size:3+Math.random()*4});
  }
}
function spawnDust(x,y){
  for(let i=0;i<8;i++){ const a=-Math.PI/2+(Math.random()-0.5)*2; const sp=30+Math.random()*90;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:-Math.abs(Math.sin(a))*sp*0.4,life:0.35,age:0,color:'#cbb9e6',size:2+Math.random()*3}); }
}
function spawnConfetti(n){
  const cols=[COL.purple,COL.purpleLt,COL.green,COL.amber,'#fff','#ff5fa2'];
  for(let i=0;i<n;i++){ confetti.push({x:Math.random()*VW,y:-20-Math.random()*300,vx:(Math.random()-0.5)*80,vy:80+Math.random()*160,rot:Math.random()*6,vr:(Math.random()-0.5)*10,size:6+Math.random()*7,color:cols[i%cols.length],life:4}); }
}
function addToast(text,color){ toasts.push({text,color:color||COL.purple,age:0,life:2.2}); }

/* ============================ COLLISION HELPERS ============================ */
function solids(){
  const arr=[];
  for(const p of L.platforms) arr.push(p);
  for(const t of L.trapdoors) if(!t.dropped) arr.push(t);
  for(const f of L.fakes) if(!f.vanished) arr.push(f);
  for(const m of (L.movers||[])) arr.push(m);
  if(hasCard) for(const h of L.hidden) arr.push(h);
  return arr;
}
function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function updateMovers(){
  const list=[];
  for(const h of L.hidden) if(h.amp>0) list.push(h);
  for(const m of (L.movers||[])) list.push(m);
  for(const o of list){
    o.px=o.x; o.py=o.y;
    const off=Math.sin(worldTime*o.speed)*o.amp;
    if(o.axis==='y') o.y=o.by+off; else o.x=o.bx+off;
  }
  // carry the player when riding a moving platform
  if(player.grounded && player.onPlat && list.indexOf(player.onPlat)>=0){
    player.x += player.onPlat.x - player.onPlat.px;
    player.y += player.onPlat.y - player.onPlat.py;
  }
}

/* ============================ UPDATE ============================ */
function update(dt){
  // global fx timers regardless of state
  shake=Math.max(0,shake-dt*60);
  invuln=Math.max(0,invuln-dt);
  pendingTrap.t=Math.max(0,pendingTrap.t-dt); if(pendingTrap.t<=0) pendingTrap.type=null;
  flash=Math.max(0,flash-dt*1.5);
  comboFlash=Math.max(0,comboFlash-dt);
  imp.bob+=dt; imp.sayT=Math.max(0,imp.sayT-dt);
  // particles
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.age+=dt; if(p.age>=p.life){particles.splice(i,1);continue;} p.vy+=520*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
  for(let i=confetti.length-1;i>=0;i--){ const c=confetti[i]; c.life-=dt; if(c.life<=0){confetti.splice(i,1);continue;} c.vy+=40*dt; c.x+=c.vx*dt; c.y+=c.vy*dt; c.rot+=c.vr*dt; }
  for(let i=toasts.length-1;i>=0;i--){ toasts[i].age+=dt; if(toasts[i].age>=toasts[i].life) toasts.splice(i,1); }

  if(state==='dying'){ deathTimer+=dt; return; }
  if(state!=='play') return;

  dt=Math.min(dt,0.033);
  player.anim+=dt; worldTime+=dt;
  updateMovers();

  // dash timer
  if(dashT>0){ dashT-=dt; if(dashT<=0) addToast('Paid in full — clean & done! ✅',COL.purple);
    if(Math.random()<0.6) particles.push({x:player.x+P_W/2,y:player.y+P_H/2,vx:-player.face*120,vy:(Math.random()-0.5)*40,life:0.3,age:0,color:COL.purpleLt,size:4}); }

  // horizontal velocity — a minimum-payment shove overrides input briefly
  if(shove.t>0){ shove.t-=dt; player.vx=shove.vx; player.face=shove.vx>0?1:-1; }
  else {
    let dir=(input.right?1:0)-(input.left?1:0);
    if(hardMode && L.invert) dir=-dir;   // Québec twist: left/right swapped on flagged levels
    const spd=MOVE*(dashT>0?1.9:1);
    player.vx=dir*spd;
    if(dir!==0) player.face=dir;
  }

  // gravity
  player.vy += (player.vy<0?GRAV_UP:GRAV_DOWN)*dt;
  if(player.vy>MAX_FALL) player.vy=MAX_FALL;

  // --- move X + resolve ---
  player.x += player.vx*dt;
  const box={x:player.x,y:player.y,w:P_W,h:P_H};
  for(const s of solids()){
    box.x=player.x;
    if(overlap(box,s)){
      if(player.vx>0) player.x=s.x-P_W;
      else if(player.vx<0) player.x=s.x+s.w;
      player.vx=0;
    }
  }
  if(player.x<0) player.x=0;
  if(player.x>L.worldW-P_W) player.x=L.worldW-P_W;

  // --- move Y + resolve ---
  const prevBottom=player.y+P_H, prevTop=player.y;
  player.y += player.vy*dt;
  player.grounded=false; player.onPlat=null;
  box.x=player.x; box.y=player.y;
  for(const s of solids()){
    box.y=player.y;
    if(overlap(box,s)){
      if(player.vy>=0 && prevBottom<=s.y+2){          // landing on top
        player.y=s.y-P_H;
        if(player.vy>520){ sfx.land(); spawnDust(player.x+P_W/2,player.y+P_H); if(player.vy>900) shake=Math.max(shake,7); }
        player.vy=0; player.grounded=true; player.onPlat=s; player.jumpCut=false;
        player.squash=Math.min(1,player.squash+0.4);
      } else if(player.vy<0 && prevTop>=s.y+s.h-2){    // head bump
        player.y=s.y+s.h; player.vy=10;
      }
    }
  }

  // record safe ground
  if(player.grounded && player.onPlat && (player.onPlat.kind==='ground'||player.onPlat.kind==='plat'||player.onPlat.kind==='hidden')){
    lastSafe={x:player.x,y:player.y};
  }

  // trapdoor / fake triggers
  if(player.grounded && player.onPlat){
    const op=player.onPlat;
    if(op.kind==='trapdoor'){ op.trig=true; }
    if(op.kind==='fake'){ op.trig=true; }
  }
  for(const t of L.trapdoors){ if(t.trig && !t.dropped){ t.t+=dt; if(t.t>(t.d||D().trap)){ t.dropped=true; t.known=true; pendingTrap={type:'trapdoor',t:1.3}; shake=Math.max(shake,10); spawnDust(t.x+t.w/2,t.y); spawnBurst(t.x+t.w/2,t.y+20,'#7357a8',10); beep(120,0.25,'sawtooth',0.14,60); imp.say='hehe 😈';imp.sayT=1.3;imp.mood='laugh'; } } }
  for(const f of L.fakes){ if(f.trig && !f.vanished){ f.t+=dt; if(f.t>D().fake){ f.vanished=true; f.known=true; pendingTrap={type:'fake',t:1.3}; shake=Math.max(shake,8); spawnBurst(f.x+f.w/2,f.y,COL.amber,14); beep(200,0.2,'triangle',0.12,80); } } }

  // spikes rise when player approaches on same floor
  for(const s of L.spikes){
    const pcx=player.x+P_W/2;
    const R=D().spikeR;
    const near = pcx>s.x-R && pcx<s.x+s.w+R;
    s.trig = s.trig || near;
    const target=s.trig?1:0;
    s.cur += (target-s.cur)*Math.min(1,dt*D().spikeSpd);
    if(s.cur>0.55) s.known=true;
    if(s.cur>0.02 && !s._roar && s.cur<0.2){ s._roar=true; shake=Math.max(shake,6); beep(90,0.18,'sawtooth',0.1,220); if(imp.sayT<=0){imp.say='surprise! 😈';imp.sayT=1.1;imp.mood='laugh';} }
  }

  // minimum-payment shover walls — pop out and fling you toward the debt pit
  for(const s of (L.shovers||[])){
    if(s.fired) s.anim=Math.min(1,s.anim+dt*6);
    if(!s.fired && player.grounded && player.x+P_W/2>s.triggerX && player.x+P_W/2<s.triggerX+70){
      s.fired=true; s.known=true; s.anim=0.001;
      shove={t:D().shoveT,vx:s.dir*D().shoveV}; pendingTrap={type:'shover',t:1.4};
      shake=Math.max(shake,12); beep(150,0.22,'square',0.16,70);
      imp.say='min payment! 😈'; imp.sayT=1.3; imp.mood='laugh';
    }
  }

  // --- jump (coyote + buffer + variable + double-tap power jump) ---
  if(player.grounded){ player.coyote=COYOTE; player.boostUsed=false; player.powerHeld=false; player.jumped=false; }
  else player.coyote-=dt;
  if(jumpQueued){ player.jumpBuf=BUFFER; jumpQueued=false; }
  player.jumpBuf-=dt;
  if(player.jumpBuf>0 && player.coyote>0){
    player.vy=JUMP_V; player.grounded=false; player.coyote=0; player.jumpBuf=0; player.jumpCut=false;
    player.jumpY0=player.y; player.jumped=true;
    sfx.jump(); player.squash=-0.5; spawnDust(player.x+P_W/2,player.y+P_H);
  }
  // double-tap "power jump": bring a quick-tap hop up to full HELD height (not higher) — once per jump
  if(powerJumpQueued){
    powerJumpQueued=false;
    const MAXRISE=(JUMP_V*JUMP_V)/(2*GRAV_UP);   // apex a full held jump reaches (~156px)
    if(player.grounded || player.coyote>0){ player.powerHeld=true; player.boostUsed=true; }  // grounded: just don't cut this jump
    else if(player.jumped && !player.boostUsed){                                             // airborne from the first hop
      const remaining=MAXRISE-(player.jumpY0-player.y);   // how much more rise to reach the held apex
      player.boostUsed=true; player.powerHeld=true; player.jumpCut=false;
      if(remaining>4){ player.vy=-Math.sqrt(2*GRAV_UP*remaining);
        sfx.jump(); player.squash=-0.55; spawnDust(player.x+P_W/2,player.y+P_H); spawnBurst(player.x+P_W/2,player.y+P_H,SEZ.mauve,8); }
    }
  }
  if(player.vy<0 && !input.jumpHeld && !player.jumpCut && !player.powerHeld){ player.vy*=CUT; player.jumpCut=true; }
  player.squash += (0-player.squash)*Math.min(1,dt*10);

  // ---------- collectibles ----------
  const pb={x:player.x,y:player.y,w:P_W,h:P_H};
  for(const c of L.coins){ if(c.collected) continue;
    if(Math.hypot((player.x+P_W/2)-c.x,(player.y+P_H/2)-c.y)<c.r+18){
      c.collected=true; sfx.coin(streak);
      spawnBurst(c.x,c.y,COL.green,16);
      // streak: in-order builds it
      if(c.order===streak){ streak++; combo++; comboFlash=0.6;
        if(streak>=L.coins.length && !streakRewarded){ streakRewarded=true; sfx.levelup();
          score+=500; addToast('⬆️ Perfect on-time streak! +500', COL.green);
          spawnBurst(player.x+P_W/2,player.y,COL.green,26);
        }
      } else { combo=0; }
      score+=100+streak*25+combo*15;
      const got=L.coins.filter(x=>x.collected).length;
      addToast('Installment '+got+'/'+L.coins.length+' paid 🟣',COL.purple);
      if(got===L.coins.length){ addToast('All '+L.coins.length+' paid — exit portal OPEN! 🌀',COL.purple); }
    }
  }
  if(L.puck && !L.puck.collected){
    if(Math.hypot((player.x+P_W/2)-L.puck.x,(player.y+P_H/2)-L.puck.y)<L.puck.r+18){
      L.puck.collected=true; score+=500; sfx.coin(3);
      spawnBurst(L.puck.x,L.puck.y,'#111',18);
      addToast('🏒 Hidden hockey puck! +500 — eh!',COL.ink);
    }
  }
  if(hardMode && L.compliance && !L.compliance.collected){
    if(Math.hypot((player.x+P_W/2)-L.compliance.x,(player.y+P_H/2)-L.compliance.y)<26){
      L.compliance.collected=true; score+=200; sfx.card();
      spawnBurst(L.compliance.x,L.compliance.y,COL.amber,16);
      addToast('📋 Conformité déposée — compliance filed! ⚜️',COL.purple);
    }
  }
  if(L.card && !L.card.taken){
    if(overlap(pb,L.card)){ L.card.taken=true; hasCard=true; sfx.card();
      spawnBurst(L.card.x,L.card.y,COL.purpleLt,20);
      addToast('💳 Virtual Card — hidden bridge revealed!',COL.purple);
      imp.mood='shock'; imp.say='wha—?!'; imp.sayT=1.6;
    }
  }
  if(L.dash && !L.dash.taken){
    if(overlap(pb,L.dash)){ L.dash.taken=true; dashT=2.6; sfx.dash(); score+=300;
      addToast('⚡ PAY IN FULL — dash boost!',COL.purple); }
  }

  // checkpoints
  for(const c of L.checkpoints){ if(!c.active && overlap(pb,c)){ c.active=true; cp={x:c.x-20,y:FLOOR-P_H}; sfx.ui(); addToast('Checkpoint ✓',COL.green); spawnBurst(c.x,c.y,COL.green,10); } }

  // ---------- hazards ----------
  for(const s of L.spikes){ if(s.cur>0.55){ const top=FLOOR-s.h*s.cur; const sb={x:s.x,y:top,w:s.w,h:FLOOR-top}; if(overlap(pb,sb)){ die('spike'); return; } } }
  for(const lv of L.lava){ if(overlap(pb,lv)){ die('void'); return; } }
  if(player.y>VH+40){ die('void'); return; }

  // ---------- exit ----------
  const coinsDone=L.coins.filter(c=>c.collected).length>=L.coins.length;
  const compliant=!hardMode || (L.compliance && L.compliance.collected);
  const open=coinsDone && compliant;
  // near-exit betrayal: the old way DENIES your credit right at the finish line
  if(L.denial && open && !denialKnown && !denialFired && player.x+P_W/2 > L.exit.x-72){
    denialFired=true; denialKnown=true; flash=0.55; shake=Math.max(shake,20);
    beep(175,0.4,'sawtooth',0.2,70); beep(120,0.45,'square',0.18,60);
    imp.mood='laugh'; imp.say='DENIED! 😈'; imp.sayT=2.4;
    cp={x:Math.max(L.spawn.x,L.exit.x-110),y:FLOOR-P_H};  // retry lands right before the portal → instant APPROVED payoff
    die('denial'); return;
  }
  if(overlap(pb,L.exit)){
    if(open){ completeLevel(); return; }
    else if(imp.sayT<=0){ addToast(coinsDone&&!compliant?'File your Québec compliance form first! ⚜️':'Collect all '+L.coins.length+' installments first! 🟣',COL.amber); imp.sayT=1; }
  }

  // camera
  const target=Math.max(0,Math.min(player.x-VW*0.4, L.worldW-VW));
  camX += (target-camX)*Math.min(1,dt*8);
}

function completeLevel(){
  state='clear'; showPads(false); sfx.win(); spawnConfetti(50);
  const timeless=0;
  score+= (dashT>0?400:0);
  score+= 1000; // clear bonus
  totalScore+=score;
  imp.mood='shock'; imp.say='noooo 😩'; imp.sayT=3;
}

/* ============================ RENDER ============================ */

function drawWorld(){
  ctx.save();
  const sx=(shake>0?(Math.random()-0.5)*shake:0), sy=(shake>0?(Math.random()-0.5)*shake:0);
  ctx.translate(-camX+sx, sy);

  // lava
  for(const lv of L.lava){
    const g=ctx.createLinearGradient(0,lv.y,0,lv.y+lv.h+40); g.addColorStop(0,'#F87171'); g.addColorStop(1,'#B91C1C');
    ctx.fillStyle=g; ctx.fillRect(lv.x,lv.y,lv.w,lv.h+80);
    ctx.fillStyle='rgba(255,220,180,.5)';
    for(let i=0;i<lv.w;i+=26){ const wob=Math.sin(player.anim*4+i)*3; ctx.fillRect(lv.x+i,lv.y+wob,14,4); }
    ctx.fillStyle='rgba(255,255,255,.9)'; ctx.font='700 12px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.textAlign='center';
    ctx.fillText(trapLabel('DEBT'), lv.x+lv.w/2, lv.y+lv.h/2+4);
  }

  // ground + platforms
  for(const p of L.platforms) drawPlat(p, p.kind==='ground'?COL.purple:COL.purpleLt);

  // hidden platforms — invisible until the Virtual Card reveals the bridge
  for(const h of L.hidden){
    if(hasCard){ drawPlat(h,COL.purpleLt); drawCardIcon(h.x+h.w/2,h.y-9,9,'#fff');
      if(h.amp>0){ ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font='10px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.textAlign='center'; ctx.fillText('↕',h.x+h.w/2,h.y+15); } }
  }
  // moving platforms
  for(const m of (L.movers||[])){ drawPlat(m,'#7c5fb0'); ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font='10px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.textAlign='center'; ctx.fillText(m.axis==='y'?'↕':'↔',m.x+m.w/2,m.y+15); }
  // shover walls (minimum payment)
  for(const s of (L.shovers||[])){
    if(s.fired && s.anim<1){ const h=94*Math.sin(Math.PI*Math.min(1,s.anim));
      const g=ctx.createLinearGradient(0,FLOOR-h,0,FLOOR); g.addColorStop(0,'#f87171'); g.addColorStop(1,COL.red);
      ctx.fillStyle=g; rr(s.x,FLOOR-h,18,h,4); ctx.fill();
      if(h>50){ label(s.x+9,FLOOR-h-6,trapLabel('MIN. PAYMENT'),COL.red); } }
    else if(s.known){ ctx.save(); ctx.globalAlpha=.6; ctx.strokeStyle=COL.amber; ctx.setLineDash([4,3]); ctx.lineWidth=2; ctx.strokeRect(s.x,FLOOR-34,18,34); ctx.setLineDash([]); ctx.restore(); label(s.x+9,FLOOR-42,'⚠ SHOVE',COL.amber); }
  }

  // trapdoors — look like plain ground until you've been burned once
  for(const t of L.trapdoors){
    if(!t.dropped){
      const gd=ctx.createLinearGradient(0,FLOOR,0,FLOOR+120); gd.addColorStop(0,COL.purple); gd.addColorStop(1,'#48306f');
      ctx.fillStyle=gd; ctx.fillRect(t.x,FLOOR,t.w,Math.max(120,VH-FLOOR+40));
      ctx.fillStyle='rgba(255,255,255,.16)'; ctx.fillRect(t.x,FLOOR,t.w,3);
      if(t.known){
        ctx.strokeStyle=COL.amber; ctx.setLineDash([5,4]); ctx.lineWidth=2;
        ctx.strokeRect(t.x+2,FLOOR+2,t.w-4,28); ctx.setLineDash([]);
        label(t.x+t.w/2, FLOOR-8, '⚠ '+trapLabel(t.label), COL.amber);
      }
    }
  }
  // fakes — look like a real platform until they betray you once
  for(const f of L.fakes){ if(!f.vanished){
    drawPlat(f, COL.purpleLt);
    if(f.known){ ctx.strokeStyle=COL.amber; ctx.setLineDash([4,3]); ctx.lineWidth=2; rr(f.x,f.y,f.w,f.h,8); ctx.stroke(); ctx.setLineDash([]); label(f.x+f.w/2,f.y-8,'⚠ '+trapLabel(f.label),COL.amber); }
  } }

  // spikes
  for(const s of L.spikes){
    if(s.cur<0.02){
      if(s.known){ // knowledge tell: dotted warning where the fee will pop
        ctx.fillStyle='rgba(245,158,11,.75)';
        for(let i=0;i<3;i++){ ctx.beginPath(); ctx.arc(s.x+s.w/2-8+i*8, FLOOR-4, 2.2, 0,7); ctx.fill(); }
      }

    }
    const h=s.h*s.cur, top=FLOOR-h; const n=Math.max(2,Math.floor(s.w/16));
    ctx.fillStyle=s.cur>0.55?COL.red:'#f39b9b';
    for(let i=0;i<n;i++){ const bx=s.x+i*(s.w/n); ctx.beginPath(); ctx.moveTo(bx,FLOOR); ctx.lineTo(bx+(s.w/n)/2,top); ctx.lineTo(bx+(s.w/n),FLOOR); ctx.closePath(); ctx.fill(); }
    if(s.cur>0.4) label(s.x+s.w/2, top-8, trapLabel(s.label), COL.red);
  }

  // checkpoints (flags)
  for(const c of L.checkpoints){
    ctx.fillStyle='#9b8bbd'; ctx.fillRect(c.x, c.y, 4, c.h);
    ctx.fillStyle=c.active?COL.green:'#c9bce0';
    ctx.beginPath(); ctx.moveTo(c.x+4,c.y); ctx.lineTo(c.x+30,c.y+9); ctx.lineTo(c.x+4,c.y+18); ctx.closePath(); ctx.fill();
    if(c.active){ ctx.font='11px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.textAlign='center'; ctx.fillText('✓',c.x+14,c.y+13); }
  }

  // card / dash pickups
  if(L.card && !L.card.taken){ const cd=L.card; const fl=Math.sin(player.anim*4)*3;
    ctx.save(); ctx.translate(cd.x,cd.y+fl); rr(0,0,cd.w,cd.h,5); ctx.fillStyle=COL.purple; ctx.fill();
    ctx.fillStyle=COL.amber; ctx.fillRect(4,6,10,7); ctx.fillStyle='#fff'; ctx.font='8px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.textAlign='left'; ctx.fillText('sezzle',4,22); ctx.restore();
    glowLabel(cd.x+cd.w/2,cd.y-8,'VIRTUAL CARD',COL.purple);
  }
  if(L.dash && !L.dash.taken){ const d=L.dash; const fl=Math.sin(player.anim*5)*3;
    ctx.save(); ctx.shadowColor=COL.amber; ctx.shadowBlur=14; drawBolt(d.x+d.w/2,d.y+d.h/2+fl,30,COL.amber); ctx.restore();
    glowLabel(d.x+d.w/2,d.y-6,'PAY IN FULL',COL.purple);
  }

  // hidden puck
  if(L.puck && !L.puck.collected){ const pk=L.puck; const fl=Math.sin(player.anim*3)*3, y=pk.y+fl;
    ctx.fillStyle='#0d0d0d'; ctx.beginPath(); ctx.ellipse(pk.x,y+4,pk.r,pk.r*0.55,0,0,7); ctx.fill();
    ctx.fillStyle='#2b2b2b'; ctx.beginPath(); ctx.ellipse(pk.x,y,pk.r,pk.r*0.55,0,0,7); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.16)'; ctx.beginPath(); ctx.ellipse(pk.x-pk.r*0.3,y-1,pk.r*0.4,pk.r*0.18,0,0,7); ctx.fill();
    glowLabel(pk.x,y-pk.r-9,'BONUS',COL.ink);
  }

  // coins
  for(const c of L.coins){ if(c.collected) continue; drawCoin(c); }

  // compliance form (Québec mode only)
  if(hardMode && L.compliance && !L.compliance.collected){
    const cf=L.compliance, fl=Math.sin(player.anim*4)*3;
    ctx.save(); ctx.translate(cf.x,cf.y+fl); ctx.shadowColor=COL.amber; ctx.shadowBlur=12;
    ctx.fillStyle='#fff'; rr(-11,-15,22,30,3); ctx.fill();
    ctx.shadowBlur=0; ctx.strokeStyle=COL.purple; ctx.lineWidth=1.5; rr(-11,-15,22,30,3); ctx.stroke();
    ctx.fillStyle=COL.purpleLt; for(let i=0;i<2;i++) ctx.fillRect(-7,-10+i*4,14,2);
    drawFleur(0,7,12,COL.purple); ctx.restore();
    glowLabel(cf.x,cf.y-22,'CONFORMITÉ',COL.purple);
  }

  // exit portal + flag
  drawExit(L.exit, L.coins.filter(c=>c.collected).length>=L.coins.length && (!hardMode||(L.compliance&&L.compliance.collected)));

  // player
  drawPlayer();

  // particles
  for(const p of particles){ const a=1-p.age/p.life; ctx.globalAlpha=Math.max(0,a); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,7); ctx.fill(); }
  ctx.globalAlpha=1;

  ctx.restore();
}
function drawPlat(p,color){
  if(p.kind==='ground'){
    // flat, square-cornered so contiguous floor tiles seamlessly (traps leave no seam).
    // Fill extends to the bottom of the (possibly taller) canvas so no sky shows under the floor.
    const gh=Math.max(p.h, VH-p.y+40);
    const g=ctx.createLinearGradient(0,p.y,0,p.y+p.h); g.addColorStop(0,color); g.addColorStop(1,'#48306f');
    ctx.fillStyle=g; ctx.fillRect(p.x,p.y,p.w,gh);
    ctx.fillStyle='rgba(255,255,255,.16)'; ctx.fillRect(p.x,p.y,p.w,3);
  } else {
    ctx.save(); ctx.shadowColor='rgba(74,48,117,.35)'; ctx.shadowBlur=8; ctx.shadowOffsetY=4;
    rr(p.x,p.y,p.w,p.h,9);
    const g=ctx.createLinearGradient(0,p.y,0,p.y+p.h); g.addColorStop(0,'#9c80d1'); g.addColorStop(1,color);
    ctx.fillStyle=g; ctx.fill(); ctx.restore();
    ctx.fillStyle='rgba(255,255,255,.28)'; rr(p.x+3,p.y+2,p.w-6,4,2); ctx.fill();
  }
}
function label(x,y,text,color){ ctx.save(); ctx.font='800 12px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  const w=ctx.measureText(text).width+14; rr(x-w/2,y-11,w,19,9); ctx.fillStyle='rgba(42,33,64,.9)'; ctx.fill();
  ctx.fillStyle=color; ctx.fillText(text,x,y-1); ctx.restore(); }
function glowLabel(x,y,text,color){ ctx.save(); ctx.font='800 12px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor=color; ctx.shadowBlur=10; ctx.fillStyle='#fff';
  const w=ctx.measureText(text).width+14; rr(x-w/2,y-11,w,18,9); ctx.fillStyle=color; ctx.fill();
  ctx.shadowBlur=0; ctx.fillStyle='#fff'; ctx.fillText(text,x,y-2); ctx.restore(); }
function drawCoin(c){
  const fl=Math.sin(player.anim*4+c.x)*3; const y=c.y+fl;
  ctx.save();
  // each installment is a Sezzle logo, gently bobbing (glow is baked into the sprite)
  drawSezzleLogo(c.x, y, c.r*1.45, Math.sin(player.anim*1.6+c.x)*0.12);
  // installment number badge above it
  ctx.fillStyle=SEZ.mauve; ctx.font='800 10px '+FONT; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText(String(c.order+1), c.x, y-c.r*1.7-4);
  ctx.textAlign='left'; ctx.restore();
}
function drawExit(e,open){
  // portal — just the Sezzle logo mark (open = vivid + glow + bob; locked = dimmed + count)
  ctx.save(); const cx=e.x+e.w/2, cy=e.y+e.h/2; const s=Math.min(e.w,e.h)*0.98;
  ctx.textAlign='center';
  if(open){
    drawSezzleLogo(cx,cy+Math.sin(player.anim*2)*3,s);   // gently bobbing logo (glow is baked into the sprite)
  } else {
    ctx.globalAlpha=0.4; drawSezzleLogo(cx,cy-2,s*0.9); ctx.globalAlpha=1;
    ctx.fillStyle='#8a79ad'; ctx.font='800 12px '+FONT; ctx.fillText('🔒 '+L.coins.filter(c=>c.collected).length+'/'+L.coins.length,cx,cy+e.h/2+4);
  }
  // once you've learned the fake denial, Sezzle stamps you APPROVED
  if(L.denial && denialKnown){ ctx.font='800 10px '+FONT;
    const t='SEZZLE ✓ APPROVED', w=ctx.measureText(t).width+14; ctx.shadowColor=COL.green; ctx.shadowBlur=10;
    rr(cx-w/2,e.y-32,w,17,8); ctx.fillStyle=COL.green; ctx.fill(); ctx.shadowBlur=0; ctx.fillStyle='#fff'; ctx.fillText(t,cx,e.y-20); }
  ctx.textAlign='left'; ctx.restore();
}
function drawPlayer(){
  const cx=player.x+P_W/2, by=player.y+P_H;
  const sq=player.squash; const sw=1-sq*0.3, sh=1+sq*0.3;
  // contact shadow
  ctx.save(); ctx.globalAlpha=(invuln>0 && Math.floor(player.anim*20)%2===0)?0.25:0.5;
  ctx.fillStyle='rgba(74,48,117,.35)'; ctx.beginPath(); ctx.ellipse(cx,by+2,P_W*0.5,4,0,0,7); ctx.fill(); ctx.restore();
  ctx.save();
  if(invuln>0 && Math.floor(player.anim*20)%2===0) ctx.globalAlpha=0.5;
  ctx.translate(cx,by); ctx.scale(player.face*sw,sh);
  // legs
  const step=Math.sin(player.anim*16)*(Math.abs(player.vx)>10 && player.grounded?3:0);
  ctx.fillStyle='#4a2f78'; rr(-8,-5,7,6+step,3); ctx.fill(); rr(1,-5,7,6-step,3); ctx.fill();
  // body (gradient capsule)
  const g=ctx.createLinearGradient(0,-P_H,0,0); g.addColorStop(0,'#7d5eb3'); g.addColorStop(1,COL.purple);
  ctx.fillStyle=g; rr(-P_W/2,-P_H,P_W,P_H,10); ctx.fill();
  // belly
  ctx.fillStyle='#F3EEFA'; rr(-P_W/2+4,-P_H+15,P_W-8,P_H-19,7); ctx.fill();
  // eyes
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-5,-P_H+11,3.4,0,7); ctx.arc(5,-P_H+11,3.4,0,7); ctx.fill();
  ctx.fillStyle=COL.ink; ctx.beginPath(); ctx.arc(-4,-P_H+11,1.7,0,7); ctx.arc(6,-P_H+11,1.7,0,7); ctx.fill();
  // smile
  ctx.strokeStyle=COL.ink; ctx.lineWidth=1.4; ctx.lineCap='round'; ctx.beginPath(); ctx.arc(0.5,-P_H+14,3.2,0.15*Math.PI,0.85*Math.PI); ctx.stroke();
  // cheeks
  ctx.fillStyle='rgba(240,120,150,.4)'; ctx.beginPath(); ctx.arc(-8,-P_H+15,1.8,0,7); ctx.arc(9,-P_H+15,1.8,0,7); ctx.fill();
  ctx.restore();
}

/* ============================ HUD + SCREENS ============================ */
const FONT='system-ui,-apple-system,"Segoe UI",Roboto,sans-serif';
function drawHUD(){
  if(flash>0){ ctx.fillStyle='rgba(239,68,68,'+Math.min(0.55,flash)+')'; ctx.fillRect(0,0,VW,VH); }
  // top bar (taller for legibility)
  ctx.fillStyle='rgba(248,247,250,.96)'; rr(8,8,VW-16,74,18); ctx.fill();
  // small Sezzle logo mark, top-left brand accent
  drawSezzleLogo(26,26,15);
  // level name — bigger, auto-shrinks so long names never overflow
  const nm=L.name+(hardMode?' · Québec':'')+((hardMode&&L.invert)?' ⇄':'');
  let ns=18; ctx.textAlign='left'; ctx.font='800 '+ns+'px '+FONT;
  while(ctx.measureText(nm).width>VW-58 && ns>12){ ns--; ctx.font='800 '+ns+'px '+FONT; }
  ctx.fillStyle=COL.ink; ctx.fillText(nm,44,34);
  // installments label + pips + count (pips in Sezzle mauve)
  ctx.font='800 14px '+FONT; ctx.fillStyle=SEZ.mauve; ctx.fillText('Installments',18,68);
  const px0=18+ctx.measureText('Installments').width+16;
  const got=L.coins.filter(c=>c.collected).length;
  for(let i=0;i<L.coins.length;i++){ const x=px0+i*23; ctx.beginPath(); ctx.arc(x,63,9,0,7); ctx.fillStyle=i<got?SEZ.mauve:'#e0d3f0'; ctx.fill(); if(i<got){ ctx.fillStyle='#fff'; ctx.font='800 11px '+FONT; ctx.textAlign='center'; ctx.fillText('$',x,67); ctx.textAlign='left'; } }
  const cntX=px0+L.coins.length*23+4;
  ctx.textAlign='left'; ctx.fillStyle=COL.ink; ctx.font='800 18px '+FONT; ctx.fillText(got+'/'+L.coins.length,cntX,69);
  if(hardMode){ const ok=L.compliance&&L.compliance.collected; drawFleur(cntX+ctx.measureText(got+'/'+L.coins.length).width+18,64,14,ok?COL.green:SEZ.mauve); }
  // score
  ctx.textAlign='right'; ctx.fillStyle=SEZ.mauve; ctx.font='800 21px '+FONT; ctx.fillText((totalScore+score).toLocaleString(),VW-18,70);
  ctx.textAlign='left';

  // streak / XP bar (full-width, thin, no label)
  ctx.fillStyle='rgba(248,247,250,.96)'; rr(8,90,VW-16,16,8); ctx.fill();
  const bx=16, by=94, bw=VW-32, frac=Math.min(1,streak/4);
  rr(bx,by,bw,8,4); ctx.fillStyle='#e3d9f4'; ctx.fill();
  if(frac>0){ ctx.save(); rr(bx,by,bw*frac,8,4); ctx.clip(); const g=ctx.createLinearGradient(bx,0,bx+bw,0); g.addColorStop(0,SEZ.mauve); g.addColorStop(1,SEZ.green); ctx.fillStyle=g; ctx.fillRect(bx,by,bw,8); ctx.restore(); }

  // dash meter
  if(dashT>0){ drawBolt(VW/2-42,128,17,COL.amber); ctx.fillStyle=SEZ.mauve; ctx.font='800 15px '+FONT; ctx.textAlign='center'; ctx.fillText('DASH '+dashT.toFixed(1),VW/2+6,133); ctx.textAlign='left'; }

  // combo flash
  if(comboFlash>0 && combo>1){ ctx.save(); ctx.globalAlpha=Math.min(1,comboFlash*2); ctx.textAlign='center'; ctx.fillStyle=COL.green; ctx.font='800 '+(26+combo)+'px '+FONT; ctx.fillText('x'+combo+' STREAK!',VW/2,176); ctx.restore(); }

  drawImp();
  drawToasts();
}
function drawImp(){
  const x=VW-42, y=160+Math.sin(imp.bob*2)*4;
  impHead(x,y,20,imp.mood==='shock'?'shock':'grin');
  if(imp.sayT>0){ ctx.save(); ctx.font='800 14px '+FONT;
    const w=ctx.measureText(imp.say).width+22, bx=x-w-2, by=y-44, bh=28;   // bubble sits above-left of the imp
    rr(bx,by,w,bh,13); ctx.fillStyle='#fff'; ctx.strokeStyle=COL.purpleLt; ctx.lineWidth=1.5; ctx.fill(); ctx.stroke();
    ctx.fillStyle=COL.ink; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(imp.say,bx+w/2,by+bh/2+0.5); ctx.restore(); }
}
function drawToasts(){
  ctx.textAlign='center'; ctx.textBaseline='middle';
  let y=196;
  for(const t of toasts){ const a=t.age<0.2?t.age/0.2:(t.age>t.life-0.4?(t.life-t.age)/0.4:1);
    ctx.save(); ctx.globalAlpha=Math.max(0,a); ctx.font='800 15px '+FONT;
    const w=ctx.measureText(t.text).width+28; rr(VW/2-w/2,y-16,w,28,14); ctx.fillStyle='rgba(255,255,255,.97)'; ctx.fill();
    ctx.strokeStyle=t.color; ctx.lineWidth=1.5; ctx.stroke(); ctx.fillStyle=t.color; ctx.fillText(t.text,VW/2,y); ctx.restore();
    y+=36;
  }
  ctx.textAlign='left'; ctx.textBaseline='alphabetic';
}
function drawConfetti(){ for(const c of confetti){ ctx.save(); ctx.globalAlpha=Math.min(1,c.life); ctx.translate(c.x,c.y); ctx.rotate(c.rot); ctx.fillStyle=c.color; ctx.fillRect(-c.size/2,-c.size/2,c.size,c.size*0.6); ctx.restore(); } }

function button(text,y,color,which){
  const w=256,h=52,x=VW/2-w/2; const b={x,y,w,h}; if(which===2) menuBtn2=b; else menuBtn=b;
  ctx.save(); ctx.shadowColor='rgba(0,0,0,.25)'; ctx.shadowBlur=14; ctx.shadowOffsetY=5;
  rr(x,y,w,h,16); ctx.fillStyle=color||COL.green; ctx.fill(); ctx.restore();
  ctx.fillStyle='#fff'; ctx.font='800 19px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,VW/2,y+h/2+1); ctx.textBaseline='alphabetic'; ctx.textAlign='left';
}
function iconButton(label,y,color,which,iconFn){
  const w=256,h=52,x=VW/2-w/2; const b={x,y,w,h}; if(which===3) menuBtn3=b; else if(which===2) menuBtn2=b; else menuBtn=b;
  ctx.save(); ctx.shadowColor='rgba(0,0,0,.25)'; ctx.shadowBlur=14; ctx.shadowOffsetY=5; rr(x,y,w,h,16); ctx.fillStyle=color; ctx.fill(); ctx.restore();
  ctx.font='800 19px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif';
  const iw=22, gap=12, tw=ctx.measureText(label).width, sx=VW/2-(iw+gap+tw)/2, cy=y+h/2;
  iconFn(sx+iw/2, cy);
  ctx.fillStyle='#fff'; ctx.textAlign='left'; ctx.textBaseline='middle'; ctx.fillText(label, sx+iw+gap, cy+1);
  ctx.textBaseline='alphabetic'; ctx.textAlign='left';
}
function drawTitle(){
  const TY=(VH-VH_BASE)/2;   // vertically centre the 800-tall layout on taller (phone) canvases
  const g=ctx.createLinearGradient(0,0,0,VH); g.addColorStop(0,'#6b4aa3'); g.addColorStop(1,'#2c1e4c'); ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  // radial glow behind hero
  ctx.save(); const rg=ctx.createRadialGradient(VW/2,240+TY,20,VW/2,240+TY,250); rg.addColorStop(0,'rgba(139,111,191,.55)'); rg.addColorStop(1,'rgba(139,111,191,0)'); ctx.fillStyle=rg; ctx.fillRect(0,90+TY,VW,380); ctx.restore();
  ctx.textAlign='center';
  // floating imps
  for(let i=0;i<5;i++){ const x=55+i*82, y=690+TY+Math.sin(perf/600+i)*14; ctx.globalAlpha=0.35; impHead(x,y,12,'grin'); } ctx.globalAlpha=1;
  // hero — the Sezzle logo mark (with a small imp peeking beside it)
  drawSezzleLogo(VW/2,152+TY+Math.sin(perf/500)*8,76);
  impHead(VW/2+78,176+TY+Math.sin(perf/500+1)*6,22,'grin');
  // title
  ctx.letterSpacing='2px';
  ctx.fillStyle='#fff'; ctx.font='900 46px '+FONT; ctx.fillText('SEZZLE',VW/2,272+TY);
  ctx.fillStyle=COL.amber; ctx.fillText('DEVIL',VW/2,320+TY);
  ctx.letterSpacing='0px';
  ctx.fillStyle='rgba(255,255,255,.94)'; ctx.font='600 16px '+FONT;
  ctx.fillText('Beat the devil of paying the old way.',VW/2,358+TY);
  ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font='500 13px '+FONT;
  ctx.fillText('Pick your region — same 10 levels, more pain', VW/2,382+TY);
  iconButton('USA · EASY',410+TY,COL.green,1,(x,y)=>drawStar(x,y,11,'#fff'));
  iconButton('CANADA · MEDIUM',470+TY,COL.purple,2,(x,y)=>drawLeaf(x,y,11,'#fff'));
  iconButton('QUÉBEC · BRUTAL',530+TY,COL.red,3,(x,y)=>drawFleur(x,y,16,'#fff'));
  ctx.textAlign='center';
  ctx.fillStyle='rgba(255,255,255,.55)'; ctx.font='600 11px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif';
  ctx.fillText('Québec: harder traps · en français · + compliance', VW/2,600+TY);
  ctx.fillStyle='rgba(255,255,255,.6)'; ctx.font='700 11px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif';
  const cr='Powered by Sezzle · Sezzleville, Canada'; ctx.fillText(cr,VW/2,VH-24);
  drawLeaf(VW/2+ctx.measureText(cr).width/2+10,VH-27,6,'#E0576A');
  ctx.textAlign='left';
}
function drawDeath(){
  drawWorld();
  ctx.fillStyle='rgba(42,33,64,.82)'; ctx.fillRect(0,0,VW,VH);
  ctx.textAlign='center';
  impHead(VW/2,VH/2-158+Math.sin(perf/300)*6,46,'laugh');
  // headline — WHAT just happened (big, auto-shrinks to fit)
  const one=deathInfo?deathInfo.one:'Ouch!';
  let hs=34; ctx.font='900 '+hs+'px '+FONT;
  while(ctx.measureText(one).width>VW-40 && hs>22){ hs--; ctx.font='900 '+hs+'px '+FONT; }
  ctx.fillStyle='#fff'; ctx.fillText(one,VW/2,VH/2-78);
  // lesson card (bigger, more readable)
  ctx.fillStyle=COL.surface; rr(VW/2-186,VH/2-50,372,168,18); ctx.fill();
  ctx.font='800 14px '+FONT; ctx.letterSpacing='1.5px'; const swW=ctx.measureText('THE SEZZLE WAY').width;
  drawSezzleLogo(VW/2-swW/2-13,VH/2-27,14);
  ctx.fillStyle=SEZ.mauve; ctx.font='800 14px '+FONT; ctx.fillText('THE SEZZLE WAY',VW/2+11,VH/2-23); ctx.letterSpacing='0px';
  ctx.fillStyle=COL.ink; ctx.font='600 18px '+FONT;
  wrapText(deathInfo?deathInfo.les:'',VW/2,VH/2+4,330,24);
  button('RETRY ↻',VH/2+134,COL.purple);
  ctx.textAlign='left';
}
function drawClear(){
  drawWorld();
  ctx.fillStyle='rgba(91,63,140,.85)'; ctx.fillRect(0,0,VW,VH);
  drawConfetti();
  ctx.textAlign='center';
  ctx.fillStyle='#fff'; ctx.font='900 34px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.letterSpacing='1px'; ctx.fillText('LEVEL CLEAR!',VW/2,VH/2-90); ctx.letterSpacing='0px';
  const nC=L.coins.length, cw=44, x0=VW/2-(nC-1)*cw/2;
  for(let i=0;i<nC;i++){ const cc={x:x0+i*cw,y:VH/2-22,r:15,order:i}; drawCoin(cc); }
  ctx.font='700 16px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.fillStyle=COL.amber; ctx.textAlign='center'; ctx.fillText('Paid in '+nC+'. No fees. No interest.',VW/2,VH/2+26);
  ctx.fillStyle='#fff'; ctx.font='800 18px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.fillText('Score: '+(totalScore).toLocaleString(),VW/2,VH/2+60);
  button(levelIdx>=LEVEL_COUNT-1?'FINISH':'NEXT LEVEL ▶',VH/2+92,COL.green);
  ctx.textAlign='left';
}
function drawWin(){
  const TY=(VH-VH_BASE)/2;   // vertically centre the 800-tall layout on taller (phone) canvases
  const g=ctx.createLinearGradient(0,0,0,VH); g.addColorStop(0,'#6b4aa3'); g.addColorStop(1,'#2a1d47'); ctx.fillStyle=g; ctx.fillRect(0,0,VW,VH);
  drawConfetti();
  ctx.textAlign='center';
  drawSezzleLogo(VW/2-50,166+TY,62);
  ctx.save(); ctx.shadowColor=COL.amber; ctx.shadowBlur=20; drawTrophy(VW/2+54,172+TY,56,COL.amber); ctx.restore();
  ctx.letterSpacing='1px';
  ctx.fillStyle='#fff'; ctx.font='900 36px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.fillText('YOU BEAT',VW/2,262+TY);
  ctx.fillStyle=COL.amber; ctx.font='900 40px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.fillText('THE DEVIL!',VW/2,308+TY);
  ctx.letterSpacing='0px';
  ctx.fillStyle='rgba(255,255,255,.92)'; ctx.font='600 15px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif';
  ctx.fillText('You paid the Sezzle way — on time,',VW/2,356+TY);
  ctx.fillText('0% interest, no hidden or late fees.',VW/2,378+TY);
  if(hardMode){ ctx.fillStyle=COL.amber; ctx.font='800 14px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.fillText('...and you survived QUÉBEC compliance!',VW/2,404+TY); }
  ctx.fillStyle='#fff'; ctx.font='800 26px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.fillText('Final Score',VW/2,440+TY);
  ctx.fillStyle=COL.green; ctx.font='900 44px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.fillText(totalScore.toLocaleString(),VW/2,486+TY);
  button('PLAY AGAIN ↻',540+TY,COL.green);
  ctx.fillStyle='rgba(255,255,255,.7)'; ctx.font='700 13px system-ui,-apple-system,"Segoe UI",Roboto,sans-serif'; ctx.fillText('Powered by Sezzle · Sezzleville, Canada 🍁',VW/2,VH-30);
  ctx.textAlign='left';
}
function wrapText(text,x,y,maxW,lh){ const words=text.split(' '); let line='',yy=y;
  for(const w of words){ const test=line+w+' '; if(ctx.measureText(test).width>maxW && line){ ctx.fillText(line.trim(),x,yy); line=w+' '; yy+=lh; } else line=test; }
  ctx.fillText(line.trim(),x,yy); }

/* ============================ MAIN LOOP ============================ */
let perf=0, last=0;
function frame(t){
  if(!last) last=t; let dt=(t-last)/1000; last=t; perf=t;
  if(dt>0.05) dt=0.05;

  menuBtn=null; menuBtn2=null; menuBtn3=null;
  ctx.clearRect(0,0,VW,VH);

  if(state==='title'){ drawTitle(); }
  else {
    drawParallax();
    if(state==='play'){ update(dt); drawWorld(); drawHUD(); }
    else if(state==='dying'){ update(dt); drawDeath(); }
    else if(state==='clear'){ update(dt); drawConfetti(); drawClear(); }
    else if(state==='win'){ update(dt); drawWin(); }
  }
  requestAnimationFrame(frame);
}

resize();
requestAnimationFrame(frame);
})();
</script>
