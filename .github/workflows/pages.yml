name: Deploy to GitHub Pages

# Publishes the single-file game to GitHub Pages. The site root already
# contains index.html (a copy of sezzle-devil.html), so there is no build
# step — we just upload the repository root as the Pages artifact.

on:
  # Deploy on every push to the default branch.
  push:
    branches: [master]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Grant the token the permissions Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Serve the whole repo root; index.html is the entry point.
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
